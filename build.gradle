    options.memberLevel = JavadocMemberLevel.PUBLIC
}

tasks.register('doc') {
    group = 'lab'
    description = 'Adds project checksums to MANIFEST.MF and embeds generated Javadoc into the jar.'
    dependsOn tasks.named('jar'), tasks.named('javadoc')

    doLast {
        def digestValues = calculateProjectDigests()
        def jarFile = tasks.named('jar', Jar).get().archiveFile.get().asFile
        def manifestFile = file("$buildDir/tmp/doc-manifest/MANIFEST.MF")

        manifestFile.parentFile.mkdirs()
        manifestFile.text = (
            "Manifest-Version: 1.0\r\n" +
            "Implementation-Title: ${labProps.getProperty('project.name')}\r\n" +
            "Implementation-Version: ${project.version}\r\n" +
            "Main-Class: ${application.mainClass.get()}\r\n" +
            "Project-MD5: ${digestValues.md5}\r\n" +
            "Project-SHA1: ${digestValues.sha1}\r\n" +
            "\r\n"
        )

        delete(jarFile)
        ant.jar(destfile: jarFile, manifest: manifestFile) {
            sourceSets.main.output.classesDirs.files.each { dir ->
                fileset(dir: dir)
            }
            if (sourceSets.main.output.resourcesDir?.exists()) {
                fileset(dir: sourceSets.main.output.resourcesDir)
            }
            zipfileset(dir: file(labProps.getProperty('src.main.webapp.dir')), prefix: 'webapp')
            zipfileset(dir: tasks.named('javadoc').get().destinationDir, prefix: 'docs/javadoc')
        }
        logger.lifecycle("Updated jar with Javadoc and checksums: ${jarFile}")
    }
}

