            )
        }
    }
}

tasks.register('env') {
    group = 'lab'
    description = 'Builds and runs the jar with an alternative Java environment.'
    dependsOn tasks.named('build')

    doLast {
        def javaHome = envProps.getProperty('java_home')
        if (!javaHome) {
            throw new GradleException("Property java_home is not defined in ${labProps.getProperty('env.properties.file')}")
        }

        def javaExecutable = new File(javaHome, 'bin/java.exe')
        if (!javaExecutable.exists()) {
            javaExecutable = new File(javaHome, 'bin/java')
        }
        if (!javaExecutable.exists()) {
            throw new GradleException("Java executable was not found in ${javaHome}")
        }

        def archivePath = tasks.named('jar', Jar).get().archiveFile.get().asFile.absolutePath
        def command = [javaExecutable.absolutePath] + splitArgs(envProps.getProperty('vm_args')) + ['-jar', archivePath]

        exec {
            commandLine command
        }
    }
}

tasks.register('report') {
    group = 'lab'
    description = 'Commits JUnit XML reports to Git after successful tests.'
    dependsOn tasks.named('test')

    doLast {
        def xmlDir = tasks.named('test', Test).get().reports.junitXml.outputLocation.get().asFile
        def xmlFiles = fileTree(xmlDir).matching { include '**/*.xml' }.files
        if (xmlFiles.isEmpty()) {
            throw new GradleException("JUnit XML reports were not found in ${xmlDir}")
        }

        exec {
            commandLine (gitArgs(['add']) + xmlFiles.collect { project.relativePath(it) })
        }
        exec {
            commandLine gitArgs(['commit', '-m', labProps.getProperty('git.commit.message.report')])
            ignoreExitValue = true
        }
    }
}

tasks.register('diff') {
    group = 'lab'
    description = 'Commits changes to Git only when tracked classes were not modified.'

    doLast {
        def trackedFile = file(labProps.getProperty('tracked.classes.file'))
        if (!trackedFile.exists()) {
            throw new GradleException("Tracked class list was not found: ${trackedFile}")
        }

        def tracked = trackedFile.readLines()
            .collect { it.trim().replace('\\', '/') }
            .findAll { !it.isEmpty() && !it.startsWith('#') }

        def status = execCapture(gitArgs(['status', '--porcelain']), projectDir, true)
        if (status.exitValue != 0) {
            throw new GradleException(status.stderr ?: 'git status failed')
        }

        def changed = status.stdout.readLines()
            .findAll { !it.trim().isEmpty() }
            .collect { line -> line.length() > 3 ? line.substring(3).trim().replace('\\', '/') : '' }
            .findAll { !it.isEmpty() }

        if (changed.isEmpty()) {
            logger.lifecycle('No local changes detected.')
            return
        }

        def blocked = changed.findAll { candidate ->
            tracked.any { trackedPath -> candidate == trackedPath || candidate.endsWith(trackedPath) }
        }

        if (!blocked.isEmpty()) {
            logger.lifecycle("Commit skipped because tracked classes were modified: ${blocked}")
            return
        }

        exec {
            commandLine gitArgs(['add', '--all'])
        }
        exec {
            commandLine gitArgs(['commit', '-m', labProps.getProperty('git.commit.message.diff')])
            ignoreExitValue = true
        }
    }
}

tasks.register('history') {
    group = 'lab'
    description = 'Searches previous Git revisions until compilation succeeds and stores the diff for the next broken revision.'

    doLast {
        def tempWorktree = file(labProps.getProperty('history.dir') + '/worktree')
        delete(tempWorktree)

        exec {
            commandLine gitArgs(['worktree', 'add', '--force', '--detach', tempWorktree.absolutePath, 'HEAD'])
        }

        try {
            def revisions = execCapture(gitArgs(['-C', tempWorktree.absolutePath, 'rev-list', 'HEAD']), tempWorktree, false)
                .stdout
                .readLines()
                .findAll { !it.trim().isEmpty() }

            if (revisions.isEmpty()) {
                throw new GradleException('No Git revisions were found for the history task.')
            }

            String workingRevision = null
            String nextBrokenRevision = null

            for (int i = 0; i < revisions.size(); i++) {
                def revision = revisions[i]
                exec {
                    commandLine gitArgs(['-C', tempWorktree.absolutePath, 'checkout', '--force', revision])
                }
                stageGradleFiles(tempWorktree)

                def compileResult = execCapture(
                    [gradleCommand, '--offline', 'compile'],
                    tempWorktree,
                    true
                )

                if (compileResult.exitValue == 0) {
                    workingRevision = revision
                    if (i > 0) {
                        nextBrokenRevision = revisions[i - 1]
                    }
                    break
                }
            }

            if (!workingRevision) {
                logger.lifecycle('No compilable revision was found in Git history.')
                return
            }

            if (nextBrokenRevision) {
                def diffResult = execCapture(
                    gitArgs(['-C', tempWorktree.absolutePath, 'diff', workingRevision, nextBrokenRevision]),
                    tempWorktree,
                    false
                )
                def diffFile = file(labProps.getProperty('history.diff.file'))
                diffFile.parentFile.mkdirs()
                diffFile.text = diffResult.stdout
                logger.lifecycle("History diff saved to ${diffFile}")
            } else {
                logger.lifecycle("Current revision already compiles: ${workingRevision}")
            }
        } finally {
            exec {
                commandLine gitArgs(['worktree', 'remove', '--force', tempWorktree.absolutePath])
                ignoreExitValue = true
            }
        }
    }
}

tasks.register('team') {
    group = 'lab'
    description = 'Builds the two previous Git revisions and packages their jar archives into a zip file.'

    doLast {
        def teamRoot = file(labProps.getProperty('team.dir'))
        def exportRoot = new File(teamRoot, 'worktrees')
        def jarRoot = new File(teamRoot, 'artifacts')
        def zipFile = new File(teamRoot, 'team-revisions.zip')

        delete(teamRoot)
        exportRoot.mkdirs()
        jarRoot.mkdirs()

        def revisions = execCapture(gitArgs(['rev-list', '--max-count=2', 'HEAD~1']), projectDir, false)
            .stdout
            .readLines()
            .findAll { !it.trim().isEmpty() }

        if (revisions.size() < 2) {
            throw new GradleException('At least two previous Git revisions are required for the team task.')
        }

        revisions.each { revision ->
            def worktreeDir = new File(exportRoot, revision.take(7))
            exec {
                commandLine gitArgs(['worktree', 'add', '--force', '--detach', worktreeDir.absolutePath, revision])
            }

            try {
                stageGradleFiles(worktreeDir)
                def buildResult = execCapture([gradleCommand, '--offline', 'build'], worktreeDir, true)
                if (buildResult.exitValue != 0) {
                    throw new GradleException("Failed to build revision ${revision}: ${buildResult.stderr}")
                }

                def builtJar = new File(worktreeDir, "build/libs/${labProps.getProperty('jar.name')}")
                if (!builtJar.exists()) {
                    throw new GradleException("Jar archive was not produced for revision ${revision}")
                }

                copy {
                    from builtJar
                    into jarRoot
                    rename { "revision-${revision.take(7)}-${it}" }
                }
            } finally {
                exec {
                    commandLine gitArgs(['worktree', 'remove', '--force', worktreeDir.absolutePath])
                    ignoreExitValue = true
                }
            }
        }

        ant.zip(destfile: zipFile) {
            fileset(dir: jarRoot)
        }
        logger.lifecycle("Team archive created: ${zipFile}")
    }
}

tasks.register('prepareAltSources', Sync) {
    group = 'lab'
    description = 'Copies sources for the alternative build and applies configured replacements.'

    from sourceSets.main.java.srcDirs
    into file(labProps.getProperty('alt.src.dir'))

    doLast {
        def altDir = destinationDir

        ant.replace(
            dir: altDir,
            includes: '**/*.java',
            token: labProps.getProperty('alt.replace.token.1'),
            value: labProps.getProperty('alt.replace.value.1')
        )
        ant.replace(
            dir: altDir,
            includes: '**/*.java',
            token: labProps.getProperty('alt.replace.token.2'),
            value: labProps.getProperty('alt.replace.value.2')
        )
        ant.replaceregexp(
            byline: true,
            match: labProps.getProperty('alt.regex.match.1'),
            replace: labProps.getProperty('alt.regex.replace.1')
        ) {
            fileset(dir: altDir, includes: '**/*.java')
        }

        renameJavaSource(altDir, labProps.getProperty('alt.replace.token.1'), labProps.getProperty('alt.replace.value.1'))
        renameJavaSource(altDir, labProps.getProperty('alt.replace.token.2'), labProps.getProperty('alt.replace.value.2'))
    }
}

tasks.named('compileAltJava') {
    dependsOn tasks.named('prepareAltSources')
}

tasks.register('altJar', Jar) {
    group = 'lab'
    description = 'Packages the alternative source set into a jar archive.'
    dependsOn tasks.named('build'), tasks.named('classes'), tasks.named('altClasses')

    archiveFileName = labProps.getProperty('alt.jar.name')
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes(
            'Manifest-Version': '1.0',
            'Implementation-Title': "${labProps.getProperty('project.name')}-alt",
            'Implementation-Version': project.version,
            'Main-Class': application.mainClass.get()
        )
    }

    from sourceSets.alt.output
    from(labProps.getProperty('src.main.webapp.dir')) {
        into labProps.getProperty('webapp.archive.prefix')
    }
}

tasks.register('alt') {
    group = 'lab'
    description = 'Creates an alternative version of the program with renamed classes and variables.'
    dependsOn tasks.named('altJar')
}
