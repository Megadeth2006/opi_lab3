            'Build-Time': new SimpleDateFormat('yyyy-MM-dd HH:mm:ss').format(new Date())
        )
    }
    from(labProps.getProperty('src.main.webapp.dir')) {
        into labProps.getProperty('webapp.archive.prefix')
    }
}

tasks.register('compile') {
    group = 'lab'
    description = 'Compiles project sources.'
    dependsOn tasks.named('classes')
}

tasks.named('build') {
    group = 'lab'
    description = 'Builds the project and packages an executable jar archive.'
    setDependsOn([tasks.named('compile'), tasks.named('jar')])
}

tasks.named('clean') {
    group = 'lab'
    description = 'Removes compiled classes and all temporary build files.'
}

tasks.register('xml') {
    group = 'lab'
    description = 'Validates all XML files in the project.'

    doLast {
        def factory = DocumentBuilderFactory.newInstance()
        factory.setNamespaceAware(true)

        fileTree(projectDir).matching {
            include '**/*.xml'
        }.files.each { current ->
            try {
                factory.newDocumentBuilder().parse(current)
                logger.lifecycle("XML valid: ${current}")
            } catch (Exception ex) {
                throw new GradleException("Invalid XML file: ${current}", ex)
            }
        }
    }
}

tasks.register('scp', Exec) {
    group = 'lab'
    description = 'Transfers the built jar archive to a remote server over SCP.'
    dependsOn tasks.named('build')

    commandLine(
        labProps.getProperty('scp.command'),
        '-P',
        labProps.getProperty('scp.port'),
        tasks.named('jar', Jar).flatMap { it.archiveFile }.get().asFile.absolutePath,
        "${labProps.getProperty('scp.user')}@${labProps.getProperty('scp.host')}:${labProps.getProperty('scp.remote.dir')}"
    )
}

tasks.register('native2ascii') {
    group = 'lab'
    description = 'Creates native2ascii copies for localization property files.'

    inputs.dir(labProps.getProperty('localization.dir'))
    outputs.dir(labProps.getProperty('native2ascii.dir'))

    doLast {
        ant.native2ascii(
            src: file(labProps.getProperty('localization.dir')),
            dest: file(labProps.getProperty('native2ascii.dir')),
            includes: '**/*.properties',
            encoding: 'UTF-8'
        )
    }
}

tasks.named('javadoc') {
    dependsOn tasks.named('prepareLocalLibs')
    classpath = mainCompileLibs
    options.encoding = 'UTF-8'
