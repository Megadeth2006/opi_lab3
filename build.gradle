def gitCommand = labProps.getProperty('git.command')
def gradleCommand = labProps.getProperty('gradle.command')
def gitArgs = { List<String> args -> [gitCommand, '-c', 'safe.directory=*'] + args }

def splitArgs = { String value ->
    value == null || value.trim().isEmpty() ? [] : value.trim().split(/\s+/).toList()
}

def execCapture = { List<String> command, File workingDir = project.projectDir, boolean ignoreExitValue = false ->
    def stdout = new ByteArrayOutputStream()
    def stderr = new ByteArrayOutputStream()
    def result = exec {
        commandLine command
        this.workingDir = workingDir
        standardOutput = stdout
        errorOutput = stderr
        ignoreExitValue = ignoreExitValue
    }
    [
        exitValue: result.exitValue,
        stdout   : stdout.toString('UTF-8').trim(),
        stderr   : stderr.toString('UTF-8').trim()
    ]
}

def calculateProjectDigests = {
    def files = files(
        fileTree(labProps.getProperty('src.main.java.dir')),
        fileTree(labProps.getProperty('src.main.resources.dir')),
        fileTree(labProps.getProperty('src.main.webapp.dir')),
        fileTree(labProps.getProperty('src.test.java.dir')),
        files('build.gradle', 'build.properties', labProps.getProperty('env.properties.file'))
    ).files.findAll { it.exists() && it.isFile() }.sort { a, b -> a.path <=> b.path }

    def md5 = MessageDigest.getInstance('MD5')
    def sha1 = MessageDigest.getInstance('SHA-1')

    files.each { current ->
        def bytes = current.bytes
        md5.update(bytes)
        sha1.update(bytes)
    }

    [
        md5 : md5.digest().encodeHex().toString(),
        sha1: sha1.digest().encodeHex().toString()
    ]
}

def renameJavaSource = { File rootDir, String oldName, String newName ->
    def matches = fileTree(rootDir).matching { include "**/${oldName}.java" }.files
    matches.each { sourceFile ->
        def renamed = new File(sourceFile.parentFile, "${newName}.java")
        if (!sourceFile.renameTo(renamed)) {
            throw new GradleException("Failed to rename ${sourceFile.name} to ${renamed.name}")
        }
    }
}

def stageGradleFiles = { File targetDir ->
    copy {
        from('build.gradle', 'build.properties', labProps.getProperty('env.properties.file'), 'settings.gradle')
        into targetDir
    }
}

tasks.named('processResources') {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

tasks.named('jar', Jar) {
    archiveFileName = labProps.getProperty('jar.name')
