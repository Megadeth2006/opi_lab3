import java.security.MessageDigest
import java.text.SimpleDateFormat
import javax.xml.parsers.DocumentBuilderFactory

plugins {
    id 'java'
    id 'application'
}

def loadProperties = { File file, boolean optional = false ->
    def props = new Properties()
    if (!file.exists()) {
        if (optional) {
            return props
        }
        throw new GradleException("Required properties file was not found: ${file}")
    }
    file.withInputStream { props.load(it) }
    props
}

def labProps = loadProperties(file('build.properties'))
def envProps = loadProperties(file(labProps.getProperty('env.properties.file')), true)

group = labProps.getProperty('project.group')
version = labProps.getProperty('project.version')

application {
    mainClass = labProps.getProperty('project.main.class')
}

